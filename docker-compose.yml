# TinyAgentOS Full Stack
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Logs:    docker compose logs -f
#
# Environment variables (override with docker compose run -e VAR=val or .env):
#   TAOS_HOST          - listen address (default: 0.0.0.0)
#   TAOS_PORT          - listen port (default: 6969)
#   TAOS_DATA_DIR      - data directory (default: /app/data)
#   POSTGRES_PASSWORD  - postgres password (default: litellm)
#   OLLAMA_HOST        - ollama listen address (default: 0.0.0.0)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm}
      POSTGRES_DB: litellm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - taos-net

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-0.0.0.0}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - taos-net

  tinyagentos:
    build:
      context: .
      x-bake:
        platforms:
          - linux/amd64
          - linux/arm64
    ports:
      - "${TAOS_PORT:-6969}:6969"
      - "${TAOS_BROWSER_PROXY_PORT:-6970}:6970"
    volumes:
      - taos_data:/app/data
    environment:
      TAOS_HOST: ${TAOS_HOST:-0.0.0.0}
      TAOS_PORT: ${TAOS_PORT:-6969}
      TAOS_BROWSER_PROXY_PORT: ${TAOS_BROWSER_PROXY_PORT:-6970}
      TAOS_DATA_DIR: ${TAOS_DATA_DIR:-/app/data}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - taos-net

networks:
  taos-net:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  taos_data:
